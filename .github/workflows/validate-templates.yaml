name: Validate templates

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - master
  pull_request:
    types:
      - synchronize
      - opened

jobs:
  check-vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Cache dependencies
        id: cache-dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: npm ci

      - name: Check vulnerabilities
        run: npm audit

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Git LFS pointers
        run: |
          # Fail if any file tracked by Git LFS (per .gitattributes) was
          # committed as raw content instead of an LFS pointer.
          violations=()
          while IFS= read -r file; do
            filter=$(git check-attr filter -- "$file" | sed 's/^.*: filter: //')
            [ "$filter" = "lfs" ] || continue
            header=$(git cat-file blob "HEAD:$file" 2>/dev/null | head -n 1 || true)
            if [ "$header" != "version https://git-lfs.github.com/spec/v1" ]; then
              violations+=("$file")
            fi
          done < <(git ls-files)

          if [ "${#violations[@]}" -ne 0 ]; then
            echo "::error::Files tracked by Git LFS but committed as raw content (not LFS pointers):"
            printf '  - %s\n' "${violations[@]}"
            echo "Fix locally and commit: git add --renormalize ${violations[*]}"
            exit 1
          fi
          echo "All Git LFS-tracked files are stored as pointers."

      - uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Cache dependencies
        id: cache-dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: json_node_modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: npm ci

      - name: Check compilation errors
        run: npm run validate

      - name: Check linting errors
        run: npm run lint

      - name: Check templates
        run: npm run validate-templates
